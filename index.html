<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📖 Expert Biblique IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #ccc;
            font-size: 0.9em;
        }
        
        .chat-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .messages {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        
        .user-message {
            align-items: flex-end;
        }
        
        .bot-message {
            align-items: flex-start;
        }
        
        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
        }
        
        .user-message .message-bubble {
            background: #007aff;
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .bot-message .message-bubble {
            background: #e5e5ea;
            color: #000;
            border-bottom-left-radius: 5px;
        }
        
        .message-time {
            font-size: 0.7em;
            color: #888;
            margin-top: 5px;
            margin-left: 10px;
            margin-right: 10px;
        }
        
        .input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        
        .input-area input:focus {
            border-color: #007aff;
        }
        
        .input-area button {
            margin-left: 10px;
            padding: 12px 24px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .input-area button:hover {
            background: #0051d5;
        }
        
        .input-area button:disabled {
            background: #999;
            cursor: not-allowed;
        }
        
        .typing {
            color: #666;
            font-style: italic;
            padding: 10px 20px;
            background: #f5f5f5;
        }
        
        @media (max-width: 600px) {
            .message-bubble {
                max-width: 90%;
            }
            .header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📖 Expert Biblique IA</h1>
            <p>Posez votre question sur la Bible - Réponses avec versets</p>
        </div>
        
        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message bot-message">
                    <div class="message-bubble">
                        🙏 Bonjour ! Je suis votre expert biblique. Posez-moi une question sur la Bible, je vous répondrai avec des versets précis.
                    </div>
                    <div class="message-time">📖</div>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="question" placeholder="Ex: Qui est David ? Que dit la Bible sur l'amour ?" onkeypress="if(event.key==='Enter') askQuestion()">
                <button id="sendBtn" onclick="askQuestion()">Envoyer</button>
            </div>
            <div id="typing" class="typing" style="display: none;">✍️ L'expert biblique écrit...</div>
        </div>
    </div>

    <script>
        // REMPLACEZ CECI PAR VOTRE VRAIE CLÉ API GEMINI
        const API_KEY = 'AIzaSyBZsy1PaKYKCWk1CSb8OVVCXoF1fPfwr2Q';
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;
        
        async function askQuestion() {
            const input = document.getElementById('question');
            const question = input.value.trim();
            
            if (!question) return;
            
            // Afficher la question
            addMessage(question, 'user');
            input.value = '';
            
            // Désactiver le bouton
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            document.getElementById('typing').style.display = 'block';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `Tu es un expert biblique, théologien et historien. Tu réponds aux questions sur la Bible avec précision, en citant les versets (livre, chapitre, verset). Si tu ne sais pas, tu dis "Je ne sais pas". Sois humble, bienveillant et parle en français. La question est: ${question}`
                            }]
                        }],
                        generationConfig: {
                            temperature: 0.7,
                            maxOutputTokens: 1000
                        }
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    console.error('Erreur API:', data.error);
                    addMessage('❌ Erreur de clé API. Vérifiez votre clé Google Gemini.', 'bot');
                } else {
                    const reponse = data.candidates[0].content.parts[0].text;
                    addMessage(reponse, 'bot');
                }
            } catch (error) {
                console.error('Erreur:', error);
                addMessage('❌ Désolé, une erreur est survenue. Vérifiez votre connexion internet.', 'bot');
            } finally {
                btn.disabled = false;
                document.getElementById('typing').style.display = 'none';
            }
        }
        
        function addMessage(text, sender) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            
            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            messageDiv.appendChild(bubble);
            messageDiv.appendChild(time);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
