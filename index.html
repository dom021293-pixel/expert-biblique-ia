<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Expert Biblique - Réponses avec Versets</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dim: #7a6030;
      --parchment: #f5edd6;
      --ink: #1a120b;
      --brown: #3b2a1a;
      --brown-light: #5c4030;
      --shadow: rgba(0,0,0,0.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: #0e0a06;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 20% 20%, #2a1a08 0%, #0e0a06 60%),
                  radial-gradient(ellipse at 80% 80%, #1a0e04 0%, transparent 60%);
    }
    .bg::before {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: 0.5;
    }

    .wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 780px;
      padding: 20px 16px 40px;
      display: flex; flex-direction: column; gap: 20px;
    }

    .header {
      text-align: center;
      padding: 36px 20px 28px;
      position: relative;
    }
    .header::before, .header::after {
      content: '';
      display: block;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 12px auto;
      width: 80%;
    }
    .cross-icon {
      font-size: 2.8em;
      display: block;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 12px var(--gold-dim));
      animation: glow 3s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { filter: drop-shadow(0 0 8px var(--gold-dim)); }
      to   { filter: drop-shadow(0 0 20px var(--gold)); }
    }
    .header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.4em, 4vw, 2.2em);
      color: var(--gold-light);
      letter-spacing: 0.08em;
      text-shadow: 0 2px 20px var(--gold-dim);
    }
    .header p {
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      color: #a08050;
      font-size: 1em;
      margin-top: 6px;
    }

    .chat-box {
      background: linear-gradient(160deg, #1e1408 0%, #150f07 100%);
      border: 1px solid var(--gold-dim);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(201,168,76,0.15);
    }

    .messages {
      height: 460px;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 10px; }

    .msg { display: flex; flex-direction: column; gap: 4px; animation: fadeUp 0.35s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { align-items: flex-end; }
    .msg.bot  { align-items: flex-start; }

    .bubble {
      max-width: 82%;
      padding: 13px 18px;
      border-radius: 18px;
      line-height: 1.65;
      font-size: 0.97em;
    }
    .msg.user .bubble {
      background: linear-gradient(135deg, #7a5c20, #5a3e10);
      color: var(--parchment);
      border-bottom-right-radius: 4px;
      border: 1px solid var(--gold-dim);
    }
    .msg.bot .bubble {
      background: linear-gradient(135deg, #2a1e0e, #1e1408);
      color: #e8d8b0;
      border-bottom-left-radius: 4px;
      border: 1px solid #3a2a15;
      white-space: pre-wrap;
    }
    .msg.bot .bubble strong { color: var(--gold-light); }

    .msg-time {
      font-size: 0.7em;
      color: #5a4a30;
      padding: 0 6px;
    }

    .typing-wrap {
      display: none;
      align-items: flex-start;
      gap: 8px;
      padding: 0 20px 12px;
    }
    .typing-wrap.active { display: flex; }
    .typing-dots {
      background: #2a1e0e;
      border: 1px solid #3a2a15;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 12px 18px;
      display: flex; gap: 6px; align-items: center;
    }
    .typing-dots span {
      width: 7px; height: 7px;
      background: var(--gold-dim);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .suggestions {
      padding: 10px 20px 4px;
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .suggestion-btn {
      background: rgba(201,168,76,0.07);
      border: 1px solid var(--gold-dim);
      color: #b08840;
      padding: 6px 14px;
      border-radius: 20px;
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-size: 0.85em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .suggestion-btn:hover {
      background: rgba(201,168,76,0.15);
      color: var(--gold-light);
      border-color: var(--gold);
    }

    .input-row {
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      border-top: 1px solid #2a1e0e;
      background: rgba(0,0,0,0.2);
    }
    .input-row input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid #3a2a15;
      border-radius: 30px;
      padding: 12px 20px;
      color: var(--parchment);
      font-family: 'Crimson Pro', serif;
      font-size: 1em;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input::placeholder { color: #5a4a30; font-style: italic; }
    .input-row input:focus { border-color: var(--gold-dim); }

    .send-btn {
      background: linear-gradient(135deg, #c9a84c, #a07830);
      border: none;
      border-radius: 30px;
      padding: 12px 22px;
      color: #1a120b;
      font-family: 'Cinzel', serif;
      font-size: 0.85em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .send-btn:hover { background: linear-gradient(135deg, #f0d080, #c9a84c); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .footer {
      text-align: center;
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      color: #3a2a15;
      font-size: 0.8em;
    }

    @media (max-width: 500px) {
      .messages { height: 380px; }
      .bubble { max-width: 92%; font-size: 0.93em; }
      .send-btn { padding: 12px 14px; font-size: 0.8em; }
    }
  </style>
</head>
<body>

<div class="bg"></div>

<div class="wrapper">
  <div class="header">
    <span class="cross-icon">✝</span>
    <h1>Expert Biblique</h1>
    <p>Réponses avec versets précis — 100% biblique</p>
  </div>

  <div class="chat-box">
    <div class="messages" id="messages">
      <div class="msg bot">
        <div class="bubble">🙏 <strong>Bienvenue !</strong><br><br>Je suis votre guide biblique. Posez-moi vos questions sur la Bible, je vous répondrai avec des versets précis.</div>
        <div class="msg-time">📖 Prêt</div>
      </div>
    </div>

    <div class="typing-wrap" id="typing">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>

    <div class="suggestions" id="suggestions">
      <button class="suggestion-btn" onclick="usesuggestion(this)">Qui est David ?</button>
      <button class="suggestion-btn" onclick="usesuggestion(this)">L'amour selon la Bible</button>
      <button class="suggestion-btn" onclick="usesuggestion(this)">Les 10 commandements</button>
      <button class="suggestion-btn" onclick="usesuggestion(this)">La résurrection de Jésus</button>
      <button class="suggestion-btn" onclick="usesuggestion(this)">Que dit la Bible sur la prière ?</button>
    </div>

    <div class="input-row">
      <input type="text" id="question" placeholder="Posez votre question biblique…"
        onkeydown="if(event.key==='Enter')askQuestion()" />
      <button class="send-btn" id="sendBtn" onclick="askQuestion()">Envoyer ✦</button>
    </div>
  </div>

  <div class="footer">
    ✝ Base de connaissances biblique — Parole de Dieu
  </div>
</div>

<script>
  // Base de connaissances biblique intégrée (plus de 30 thèmes)
  const bibleDB = {
    "jésus|jesus|christ|messie|fils de dieu": "📖 <strong>Jésus-Christ</strong>\n\n« Car Dieu a tant aimé le monde qu'il a donné son Fils unique, afin que quiconque croit en lui ne périsse point, mais qu'il ait la vie éternelle. » — Jean 3:16\n\n« Je suis le chemin, la vérité, et la vie. Nul ne vient au Père que par moi. » — Jean 14:6",
    
    "résurrection|ressuscité|ressusciter|ressuscitée": "📖 <strong>La Résurrection de Jésus</strong>\n\n« Il n'est point ici; il est ressuscité, comme il l'avait dit. Venez, voyez le lieu où le Seigneur était couché. » — Matthieu 28:6\n\n« Mais maintenant, Christ est ressuscité des morts, il est les prémices de ceux qui sont morts. » — 1 Corinthiens 15:20",
    
    "david|roi david": "📖 <strong>David</strong>\n\n« David dit au Philistin: Tu marches contre moi avec l'épée, la lance et le javelot; mais moi, je marche contre toi au nom de l'Éternel des armées, du Dieu de l'armée d'Israël, que tu as insulté. » — 1 Samuel 17:45\n\nDavid était le deuxième roi d'Israël, un homme selon le cœur de Dieu.",
    
    "amour|aimer": "📖 <strong>L'Amour selon la Bible</strong>\n\n« L'amour est patient, il est plein de bonté; l'amour n'est pas envieux; l'amour ne se vante pas, il ne s'enfle pas d'orgueil. » — 1 Corinthiens 13:4\n\n« Aimez-vous les uns les autres; comme je vous ai aimés, vous aussi aimez-vous les uns les autres. » — Jean 13:34",
    
    "prière|prier|prie": "📖 <strong>La Prière</strong>\n\n« Mais quand tu pries, entre dans ta chambre, ferme ta porte, et prie ton Père qui est là dans le lieu secret; et ton Père, qui voit dans le secret, te le rendra. » — Matthieu 6:6\n\n« Priez sans cesse. » — 1 Thessaloniciens 5:17",
    
    "10 commandements|dix commandements|loi de dieu": "📖 <strong>Les Dix Commandements</strong> (Exode 20:1-17)\n\n1. Tu n'auras pas d'autres dieux devant ma face.\n2. Tu ne te feras pas d'image taillée.\n3. Tu ne prendras pas le nom de l'Éternel en vain.\n4. Souviens-toi du jour du repos.\n5. Honore ton père et ta mère.\n6. Tu ne tueras point.\n7. Tu ne commettras point d'adultère.\n8. Tu ne déroberas point.\n9. Tu ne porteras point de faux témoignage.\n10. Tu ne convoiteras point.",
    
    "moïse": "📖 <strong>Moïse</strong>\n\n« Par la foi, Moïse, devenu grand, refusa d'être appelé fils de la fille de Pharaon, aimant mieux être maltraité avec le peuple de Dieu que d'avoir pour un temps la jouissance du péché. » — Hébreux 11:24-25\n\nMoïse a conduit les Israélites hors d'Égypte et reçu les Dix Commandements sur le mont Sinaï.",
    
    "paix": "📖 <strong>La Paix</strong>\n\n« Je vous laisse la paix, je vous donne ma paix. Je ne vous donne pas comme le monde donne. Que votre cœur ne se trouble point, et ne s'alarme point. » — Jean 14:27\n\n« Que la paix de Christ règne dans vos cœurs. » — Colossiens 3:15",
    
    "peur|crainte": "📖 <strong>Ne crains rien</strong>\n\n« Ne crains rien, car je suis avec toi; Ne promène pas des regards inquiets, car je suis ton Dieu; Je te fortifie, je viens à ton secours, Je te soutiens de ma droite triomphante. » — Ésaïe 41:10\n\n« Car Dieu ne nous a pas donné un esprit de crainte, mais de force, d'amour et de sagesse. » — 2 Timothée 1:7",
    
    "salut|sauver|rédemption": "📖 <strong>Le Salut</strong>\n\n« Car c'est par la grâce que vous êtes sauvés, par le moyen de la foi. Et cela ne vient pas de vous, c'est le don de Dieu. » — Éphésiens 2:8-9\n\n« Si tu confesses de ta bouche le Seigneur Jésus, et si tu crois dans ton cœur que Dieu l'a ressuscité des morts, tu seras sauvé. » — Romains 10:9",
    
    "sagesse": "📖 <strong>La Sagesse</strong>\n\n« Le commencement de la sagesse, c'est la crainte de l'Éternel; Et la science des saints, c'est l'intelligence. » — Proverbes 9:10\n\n« Si quelqu'un manque de sagesse, qu'il la demande à Dieu, qui donne à tous simplement et sans reproche, et elle lui sera donnée. » — Jacques 1:5",
    
    "pierre|apôtre pierre": "📖 <strong>L'Apôtre Pierre</strong>\n\n« Tu es Pierre, et sur cette pierre je bâtirai mon Église, et les portes du séjour des morts ne prévaudront point contre elle. » — Matthieu 16:18\n\nPierre a renié Jésus trois fois mais a été pardonné et est devenu un pilier de l'Église.",
    
    "marie|mère de jésus": "📖 <strong>Marie, mère de Jésus</strong>\n\n« Je suis la servante du Seigneur; qu'il me soit fait selon ta parole! » — Luc 1:38\n\n« Toutes les générations me diront bienheureuse. » — Luc 1:48",
    
    "marie magdala|marie de magdala": "📖 <strong>Marie de Magdala</strong>\n\n« Le premier jour de la semaine, Jésus ressuscité apparut d'abord à Marie de Magdala, dont il avait chassé sept démons. » — Marc 16:9\n\nElle fut la première à voir Jésus ressuscité.",
    
    "paulin|apôtre paul": "📖 <strong>L'Apôtre Paul</strong>\n\n« J'ai combattu le bon combat, j'ai achevé la course, j'ai gardé la foi. Désormais, la couronne de justice m'est réservée. » — 2 Timothée 4:7-8\n\nAncien persécuteur des chrétiens, Paul est devenu le plus grand missionnaire de l'Église primitive.",
    
    "paradis|ciel": "📖 <strong>Le Paradis</strong>\n\n« Il y a plusieurs demeures dans la maison de mon Père. Je vais vous préparer une place. » — Jean 14:2\n\n« Il essuiera toute larme de leurs yeux, et la mort ne sera plus, et il n'y aura plus ni deuil, ni cri, ni douleur. » — Apocalypse 21:4"
  };
  
  const reponseDefaut = "📖 <strong>Merci pour votre question</strong>\n\n« Cherchez l'Éternel pendant qu'il se trouve; invoquez-le pendant qu'il est près. » — Ésaïe 55:6\n\nPour une réponse plus précise, posez une question sur un thème biblique (Jésus, amour, prière, David, résurrection, etc.) ou reformulez votre demande.";
  
  function getBibleResponse(question) {
    const lowerQ = question.toLowerCase();
    
    for (const [keywords, reponse] of Object.entries(bibleDB)) {
      const motsCles = keywords.split("|");
      for (const mot of motsCles) {
        if (lowerQ.includes(mot)) {
          return reponse;
        }
      }
    }
    return reponseDefaut;
  }
  
  async function askQuestion() {
    const input = document.getElementById('question');
    const question = input.value.trim();
    if (!question) return;
    
    addMessage(question, 'user');
    input.value = '';
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('typing').classList.add('active');
    document.getElementById('suggestions').style.display = 'none';
    
    setTimeout(() => {
      const reponse = getBibleResponse(question);
      addMessage(reponse, 'bot');
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('typing').classList.remove('active');
    }, 800);
  }
  
  function addMessage(text, sender) {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${sender}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text.replace(/\n/g, '<br>');
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    div.appendChild(bubble);
    div.appendChild(time);
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }
  
  function usesuggestion(btn) {
    document.getElementById('question').value = btn.textContent;
    askQuestion();
  }
</script>
</body>
</html>
